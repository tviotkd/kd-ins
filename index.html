// ולידציה תעודת זהות ישראלית
const isValidIsraeliID = (id) => {
    const cleaned = String(id).trim();
    if (!/^\d{9}$/.test(cleaned))
        return false;
    let sum = 0;
    for (let i = 0; i < 9; i++) {
        let digit = parseInt(cleaned[i]) * ((i % 2) + 1);
        if (digit > 9)
            digit -= 9;
        sum += digit;
    }
    return sum % 10 === 0;
};
// חילוץ שם מלא ות.ז — זיהוי לפי התשובות עצמן (עובד בכל סוגי התביעות)
const extractAnswers = (history) => {
    const userMsgs = history.filter(m => m.role === "user").map(m => m.content.trim());
    // ת.ז = ההודעה הראשונה של הלקוח שהיא 9 ספרות
    const idValue = userMsgs.find(v => /^\d{9}$/.test(v.replace(/[\s-]/g, ""))) || "";
    // שם מלא = ההודעה הראשונה של הלקוח שמכילה אותיות (ולא רק מספרים)
    const nameValue = userMsgs.find(v => /[א-תa-zA-Z]{2,}/.test(v) && !/^[\d\s-]+$/.test(v)) || "";
    return [
        { fieldId: "full_name", label: "שם מלא", value: nameValue },
        { fieldId: "id_number", label: "תעודת זהות", value: idValue ? idValue.replace(/[\s-]/g, "") : "" }
    ];
};

    const reader = new FileReader();

    reader.onerror = reject;
    reader.readAsDataURL(file);

const sendToWebhook = async (claimType, history, uploadedDocs) => {
    const documents = await Promise.all(Object.entries(uploadedDocs).map(async ([docName, file]) => {
        let base64 = null;
        try {
            base64 = await fileToBase64(file);
        }
        catch (e) { }
        return { documentName: docName, fileName: file.name, mimeType: file.type || "application/octet-stream", fileSize: file.size, base64 };
    }));
    const payload = {

        submittedAt: new Date().toISOString(),
        claimType: { id: claimType.id, label: claimType.label },
        answers: extractAnswers(history),
        documents
    };

        await fetch(WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    }
    catch (e) {

    }
};
