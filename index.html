function App() {
  const [screen, setScreen] = React.useState("home");
  const [selectedType, setSelectedType] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [uploadedFiles, setUploadedFiles] = React.useState([]);
  const [submitted, setSubmitted] = React.useState(false);
  const [emailSending, setEmailSending] = React.useState(false);
  const messagesEndRef = React.useRef(null);
  const fileInputRef = React.useRef(null);
 
  React.useEffect(() => {
    if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages]);
 
  function startChat(type) {
    setSelectedType(type);
    setUploadedFiles([]);
    setSubmitted(false);
    const welcome = `היי! 👋 אני הרובוט החכם של סוכנות Kaplan & Dahan 🤖 אנחנו כאן לעזור לך להגיש את תביעתך במהירות ובקלות!\n\nלתביעת **${type.title}** תצטרך להכין:\n${type.docs.map(d => `• ${d}`).join("\n")}\n\nנתחיל — מה שמך המלא?`;
    setMessages([{ role: "assistant", content: welcome }]);
    setScreen("chat");
  }
 
  async function sendMessage() {
    if (!input.trim() && uploadedFiles.length === 0) return;
    const userText = input.trim();
    setInput("");
    const newMessages = [...messages, { role: "user", content: userText || "העלאתי מסמכים" }];
    setMessages(newMessages);
    setLoading(true);
 
    try {
      const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 1000,
          system: selectedType.prompt,
          messages: apiMessages
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "מצטער, הייתה שגיאה. נסה שוב.";
      const updatedMessages = [...newMessages, { role: "assistant", content: reply }];
      setMessages(updatedMessages);
 
      // אם הבוט אומר שהתביעה מוכנה לשליחה — שלח אימייל
      if (reply.includes("תביעה מוכנה לשליחה") && !submitted) {
        setSubmitted(true);
        setTimeout(() => sendEmailSummary(updatedMessages), 500);
      }
    } catch (e) {
      setMessages(prev => [...prev, { role: "assistant", content: "מצטער, הייתה שגיאה בחיבור. נסה שוב." }]);
    }
    setLoading(false);
  }
 
  async function sendEmailSummary(msgs) {
    setEmailSending(true);
    const conversation = msgs
      .map(m => `${m.role === "user" ? "לקוח" : "בוט"}: ${m.content}`)
      .join("\n\n");
    const filesList = uploadedFiles.length > 0
      ? uploadedFiles.map(f => f.name).join(", ")
      : "לא הועלו קבצים";
 
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        claim_type: selectedType.title,
        conversation: conversation,
        files_list: filesList,
        to_email: "tviot@kd-ins.co.il"
      });
      setMessages(prev => [...prev, {
        role: "assistant",
        content: "🎉 התביעה הוגשה בהצלחה! ✅\n\nהמסמכים התקבלו ועברו לבדיקה.\nנעדכן אותך בהתקדמות התביעה בהקדם 😊\n\nלבירורים: 📞 03-3731410"
      }]);
    } catch (err) {
      setMessages(prev => [...prev, {
        role: "assistant",
        content: "🎉 התביעה הוגשה!\n\nנעדכן אותך בקרוב. לבירורים: 📞 03-3731410"
      }]);
    }
    setEmailSending(false);
  }
 
  function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    setUploadedFiles(prev => [...prev, ...files]);
    const names = files.map(f => f.name).join(", ");
    const newMessages = [...messages, {
      role: "user",
      content: `העלאתי את הקבצים הבאים: ${names}`
    }];
    setMessages(newMessages);
    setLoading(true);
 
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system: selectedType.prompt,
        messages: newMessages.map(m => ({ role: m.role, content: m.content }))
      })
    })
      .then(r => r.json())
      .then(data => {
        const reply = data.content?.[0]?.text || "קיבלתי את הקבצים!";
        const updatedMessages = [...newMessages, { role: "assistant", content: reply }];
        setMessages(updatedMessages);
        if (reply.includes("תביעה מוכנה לשליחה") && !submitted) {
          setSubmitted(true);
          setTimeout(() => sendEmailSummary(updatedMessages), 500);
        }
      })
      .catch(() => setMessages(prev => [...prev, { role: "assistant", content: "קיבלתי את הקבצים ✅" }]))
      .finally(() => setLoading(false));
  }
 
  function renderMessage(msg, i) {
    const isBot = msg.role === "assistant";
    return (
      <div key={i} style={{
        display: "flex",
        justifyContent: isBot ? "flex-start" : "flex-end",
        marginBottom: 12
      }}>
        <div style={{
          maxWidth: "80%",
          background: isBot ? "#fff" : selectedType?.color || "#2563eb",
          color: isBot ? "#1e293b" : "#fff",
          borderRadius: isBot ? "4px 18px 18px 18px" : "18px 4px 18px 18px",
          padding: "10px 14px",
          fontSize: 14,
          lineHeight: 1.6,
          boxShadow: "0 1px 4px rgba(0,0,0,0.08)",
          whiteSpace: "pre-wrap"
        }}>
          {msg.content.replace(/\*\*(.*?)\*\*/g, '$1')}
        </div>
      </div>
    );
  }
 
  // מסך בית
  if (screen === "home") {
    return (
      <div style={{ background: "#fff", borderRadius: 20, overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,0.12)" }}>
        {/* Header */}
        <div style={{ background: "#1a3a5c", padding: "20px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#fff", letterSpacing: 1 }}>KD</div>
          <div style={{ color: "#94a3b8", fontSize: 13, marginTop: 2 }}>Kaplan & Dahan</div>
          <div style={{ color: "#e2e8f0", fontSize: 15, marginTop: 8, fontWeight: 600 }}>הגשת תביעת ביטוח בריאות</div>
        </div>
 
        {/* Grid */}
        <div style={{ padding: 16 }}>
          <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", marginBottom: 14 }}>
            בחר את סוג התביעה:
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {CLAIM_TYPES.map(type => (
              <button key={type.id} onClick={() => startChat(type)} style={{
                background: type.bg,
                border: `2px solid ${type.color}20`,
                borderRadius: 14,
                padding: "14px 10px",
                cursor: "pointer",
                textAlign: "right",
                transition: "all 0.2s"
              }}
              onMouseEnter={e => e.currentTarget.style.transform = "scale(1.02)"}
              onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
              >
                <div style={{ fontSize: 24 }}>{type.icon}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: type.color, marginTop: 6, lineHeight: 1.3 }}>{type.title}</div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 4, lineHeight: 1.4 }}>{type.sub}</div>
              </button>
            ))}
          </div>
 
          {/* Phone */}
          <div style={{
            marginTop: 16,
            background: "#f0fdf4",
            border: "1px solid #bbf7d0",
            borderRadius: 12,
            padding: "12px 16px",
            textAlign: "center"
          }}>
            <div style={{ fontSize: 13, color: "#166534" }}>מעדיפים לדבר עם נציג?</div>
            <a href="tel:0337314101" style={{ fontSize: 16, fontWeight: 700, color: "#16a34a", textDecoration: "none" }}>
              📞 03-3731410
            </a>
          </div>
        </div>
      </div>
    );
  }
 
  // מסך צ'אט
  return (
    <div style={{ background: "#fff", borderRadius: 20, overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,0.12)", display: "flex", flexDirection: "column", height: "85vh", maxHeight: 680 }}>
      {/* Header */}
      <div style={{ background: selectedType.color, padding: "14px 16px", display: "flex", alignItems: "center", gap: 10 }}>
        <button onClick={() => setScreen("home")} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", borderRadius: 8, padding: "4px 10px", cursor: "pointer", fontSize: 14 }}>
          ←
        </button>
        <span style={{ fontSize: 20 }}>{selectedType.icon}</span>
        <div>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 15 }}>{selectedType.title}</div>
          <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 11 }}>Kaplan & Dahan</div>
        </div>
        <div style={{ marginRight: "auto" }}>
          <a href="tel:0337314101" style={{ color: "rgba(255,255,255,0.9)", textDecoration: "none", fontSize: 13 }}>📞 03-3731410</a>
        </div>
      </div>
 
      {/* Messages */}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px", background: "#f8fafc" }}>
        {messages.map(renderMessage)}
        {loading && (
          <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 12 }}>
            <div style={{ background: "#fff", borderRadius: "4px 18px 18px 18px", padding: "10px 16px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
              <span style={{ fontSize: 18 }}>⋯</span>
            </div>
          </div>
        )}
        {emailSending && (
          <div style={{ textAlign: "center", color: "#64748b", fontSize: 13, marginBottom: 8 }}>
            שולח אימייל... 📧
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>
 
      {/* Uploaded files chips */}
      {uploadedFiles.length > 0 && (
        <div style={{ padding: "8px 16px", background: "#f0fdf4", display: "flex", flexWrap: "wrap", gap: 6 }}>
          {uploadedFiles.map((f, i) => (
            <span key={i} style={{
              background: "#dcfce7",
              color: "#166534",
              border: "1px solid #bbf7d0",
              borderRadius: 20,
              padding: "2px 10px",
              fontSize: 12
            }}>
              ✅ {f.name}
            </span>
          ))}
        </div>
      )}
 
      {/* Input */}
      <div style={{ padding: "12px 16px", background: "#fff", borderTop: "1px solid #e2e8f0", display: "flex", gap: 8 }}>
        <input
          type="file"
          ref={fileInputRef}
          onChange={handleFileUpload}
          multiple
          accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
          style={{ display: "none" }}
        />
        <button onClick={() => fileInputRef.current.click()} style={{
          background: "#f1f5f9",
          border: "none",
          borderRadius: 12,
          padding: "0 14px",
          cursor: "pointer",
          fontSize: 18
        }}>
          📎
        </button>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendMessage()}
          placeholder="כתוב הודעה..."
          style={{
            flex: 1,
            border: "1px solid #e2e8f0",
            borderRadius: 12,
            padding: "10px 14px",
            fontSize: 14,
            outline: "none",
            fontFamily: "inherit",
            direction: "rtl"
          }}
        />
        <button onClick={sendMessage} disabled={loading} style={{
          background: selectedType.color,
          border: "none",
          borderRadius: 12,
          padding: "0 16px",
          color: "#fff",
          cursor: "pointer",
          fontSize: 18,
          opacity: loading ? 0.6 : 1
        }}>
          ➤
        </button>
      </div>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
